server:
  port: 8082

spring:
  application:
    name: production-devops-pipeline

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/employee_db}
    username: ${SPRING_DATASOURCE_USERNAME:devops}
    password: ${SPRING_DATASOURCE_PASSWORD:devops123}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    default-property-inclusion: non_null
    

management:
  info:
    env:
      enabled: true

  endpoints:
    web:
      exposure:
        include: health,info,prometheus

  endpoint:
    health:
      show-details: always

info:
  app:
    name: Production DevOps Pipeline
    version: 1.1.0
    description: Enterprise DevOps Demo
    developer: Dandu Rama Siva Naga Raju